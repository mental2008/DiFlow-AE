# Configuration file for models to be prefetched to CPU memory on workers
# This file specifies which models should be loaded to CPU memory for LRU caching

prefetch_models:
  # Base diffusion models
  - model_id: "Flux1Schnell"
    model_path: "./models/FLUX.1-schnell"
  # VAE
  - model_id: "Flux1VAE"
    model_path: "./models/FLUX.1-dev"
  # Schedulers
  - model_id: "FluxSchnellFlowMatchEulerDiscreteScheduler"
    model_path: "./models/FLUX.1-schnell"
  # Text encoders
  - model_id: "CLIP_Flux"
    model_path: "./models/FLUX.1-dev"
  - model_id: "T5_Flux"
    model_path: "./models/FLUX.1-dev"
  # ControlNet models
  - model_id: "Flux1DevControlNetDepth"
    model_path: "./models/Xlabs-AI--flux-controlnet-depth-diffusers"
  - model_id: "Flux1DevControlNetCanny"
    model_path: "./models/Xlabs-AI--flux-controlnet-canny-diffusers"